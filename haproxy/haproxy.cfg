global
    log stdout format raw local0 info
    maxconn 4096

defaults
    log     global
    mode    tcp
    timeout connect 5s
    timeout client  30m
    timeout server  30m

# ==========================================
# Frontend Configuration (Entry point)
# ==========================================
frontend openvpn_frontend
    bind *:1194
    mode tcp
    default_backend openvpn_backend

# ==========================================
# Backend Nodes with Source-IP Persistence
# ==========================================
backend openvpn_backend
    mode tcp
    balance $LB_ALGORITHM

    # Stick-table: Store client IP and pin them to the same server for 30 minutes
    # In production, stick-tables can be synced between HAProxy nodes using the "peers" directive.
    stick-table type ip size 20k expire 30m
    stick on src

    # Server list
    # check port 1194 ensures that a connection can be established.
    server node1 openvpn-node1:1194 check inter 5s fall 3 rise 2
    server node2 openvpn-node2:1194 check inter 5s fall 3 rise 2
    server node3 openvpn-node3:1194 check inter 5s fall 3 rise 2
