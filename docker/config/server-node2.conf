# ==========================================
# Hardened OpenVPN Server Config - Node 2
# ==========================================

# Port and Protocol
port 1194
proto tcp-server     # TCP is used to ensure robust stick-table load balancing in HAProxy
dev tun

# PKI Configuration
ca /etc/openvpn/pki/ca.crt
cert /etc/openvpn/pki/server-node2.crt
key /etc/openvpn/pki/server-node2.key
dh /etc/openvpn/pki/dh.pem
crl-verify /etc/openvpn/crl/crl.pem

# Secure Control Channel (DoS Mitigation)
# tls-crypt encrypts control channel metadata and prevents scanning/fingerprinting
tls-crypt /etc/openvpn/pki/tls-crypt.key

# Cryptographic Hardening
cipher AES-256-GCM
tls-version-min 1.2
tls-cipher TLS-ECDHE-RSA-WITH-AES-256-GCM-SHA384:TLS-ECDHE-ECDSA-WITH-AES-256-GCM-SHA384:TLS-DHE-RSA-WITH-AES-256-GCM-SHA384

# Network & IP Subnet Configuration (Segregated for Node 2)
server 10.8.2.0 255.255.255.0
topology subnet
push "redirect-gateway def1 bypass-dhcp"
push "dhcp-option DNS 1.1.1.1"
push "dhcp-option DNS 8.8.8.8"

# Session Settings
keepalive 10 120
max-clients 100

# Privilege Drop & Hardening (Drop root immediately after binding)
user nobody
group nobody
persist-key
persist-tun

# Logging and Status
# status /var/log/openvpn/openvpn-status.log
# log-append /var/log/openvpn/openvpn.log
verb 3
mute 20
